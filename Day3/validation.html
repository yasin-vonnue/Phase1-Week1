<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validation Form</title>
  </head>
  <body>
    <header>
      <h1>Native HTML5 Validation</h1>
    </header>

    <main>
      <form>
        <p>
          <label for="name"
            >Enter your name: <span class="required">*</span></label
          >
          <input type="text" id="name" name="name" required />
        </p>

        <p>
          <label for="email"
            >Enter your email: <span class="required">*</span></label
          >
          <input type="email" id="email" name="email" required />
        </p>

        <p>
          <label for="pwd"
            >Enter your password: <span class="required">*</span></label
          >
          <input
            type="password"
            id="pwd"
            minlength="8"
            pattern="(?=.*\d).+"
            name="pwd"
            required
          />
        </p>

        <p>
          <label for="age"
            >Enter your age: <span class="required">*</span></label
          >
          <input type="number" id="age" min="18" max="99" name="age" required />
        </p>

        <p>
          <label for="portfolio"
            >Attach your portfolio: <span class="required">*</span></label
          >
          <input type="url" id="portfolio" name="portfolio" required />
        </p>

        <p>
          <label for="dob"
            >Enter your dob: <span class="required">*</span></label
          >
          <input type="date" id="dob" max="2026-07-20" name="dob" required />
        </p>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </form>
    </main>
  </body>
</html>
