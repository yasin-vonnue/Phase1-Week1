<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
  </head>
  <body>
    <header>
      <h1>Login Form</h1>
    </header>

    <main>
      <form>
        <p>
          <label for="email"
            >Enter your email: <span class="required">*</span></label
          >
          <input
            type="email"
            autocomplete="email"
            id="email"
            name="email required"
          />
        </p>

        <p>
          <label for="password"
            >Enter your password: <span class="required">*</span></label
          >
          <input
            type="password"
            autocomplete="current-password"
            id="password"
            aria-describedby="password-info"
            name="password"
            required
          />
          <button aria-pressed="false">Show</button>
        </p>

        <p id="password-info">Must be at least 8 characters</p>

        <p>
          <label for="remember-me">Remember me</label>
          <input type="checkbox" id="remember-me" name="remember-me" />
        </p>

        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
