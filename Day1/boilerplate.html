<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">  
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>First Task</title>
    </head>
    <body>
        <p>Hello, Vonnue!</p>
    </body>
</html>

<!-- <meta> element represents metadata that describes the page. The charset attribute specifies the character
    encoding the document will use. UTF-8 includes most characters from majority of the human written languages. 
    The viewport meta tag tells browsers how to control a webpage's dimensions and scaling on different devices.
    By using the content attribute, it ensures a site renders properly on mobile screens instead of defaulting to 
    desktop-width emulations that require tiny zooming and horizontal scrolling.-->

<!-- <title> elements sets the title of the page, which is the title that appears in the browser tab when the page loads. -->
